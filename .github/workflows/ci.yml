name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Since secrets were configured (#1303) every run executes the LLM-dependent
# suite — concurrent duplicate runs bill real API usage. A new push to a ref
# supersedes the in-flight run for that ref (per-PR refs stay independent).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v2
        timeout-minutes: 15  # Protection contre timeouts
        with:
          python-version: "3.10"  # FIX: guillemets pour éviter 3.1
          environment-file: environment.yml
          activate-environment: projet-is
          use-mamba: true  # Résolution 5-10x plus rapide
          auto-update-conda: false  # Évite instabilités cache

      - name: Check code formatting
        shell: pwsh
        continue-on-error: true  # Informational — codebase not yet fully black-formatted
        run: |
          conda run -n projet-is --no-capture-output black --check --diff argumentation_analysis/ tests/ api/ project_core/

      - name: Check code linting
        shell: pwsh
        continue-on-error: true  # Informational — many pre-existing flake8 warnings
        run: |
          conda run -n projet-is --no-capture-output flake8 argumentation_analysis/ tests/ api/ project_core/

      - name: Type check (mypy strict — core orchestration)
        shell: pwsh
        run: |
          conda run -n projet-is --no-capture-output python -m mypy --config-file pyproject.toml argumentation_analysis/core/capability_registry.py argumentation_analysis/core/shared_state.py argumentation_analysis/orchestration/workflow_dsl.py argumentation_analysis/orchestration/registry_setup.py argumentation_analysis/orchestration/workflows.py argumentation_analysis/orchestration/invoke_callables.py argumentation_analysis/orchestration/state_writers.py argumentation_analysis/agents/factory.py

  automated-tests:
    runs-on: windows-latest
    # Run tests independently of lint — lint failures should not block test execution
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v2
        timeout-minutes: 15  # Protection contre timeouts
        with:
          python-version: "3.10"  # FIX: guillemets pour éviter 3.1
          environment-file: environment.yml
          activate-environment: projet-is
          use-mamba: true  # Résolution 5-10x plus rapide
          auto-update-conda: false  # Évite instabilités cache

      # Provision the React frontend build so the Starlette app imports cleanly
      # (interface_web/app.py mounts StaticFiles(directory=.../build) at module
      # import — the build dir is gitignored, CLAUDE.md prerequisite). Without
      # this, 29 starlette/proxy tests skip via the #1363 skipif (honest absence).
      # With it, CI genuinely tests the starlette surface (#1362 real fix).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # LTS, compatible with react-scripts 5.0.1
          cache: 'npm'
          cache-dependency-path: services/web_api/interface-web-argumentative/package-lock.json

      - name: Build React frontend
        working-directory: services/web_api/interface-web-argumentative
        shell: pwsh
        run: |
          npm ci --no-audit --no-fund
          npm run build
          Write-Host "✅ React build produced: $((Get-ChildItem -Recurse build | Measure-Object).Count) files"

      - name: Check API keys availability
        id: check_secrets
        shell: pwsh
        run: |
          if ("${{ secrets.OPENAI_API_KEY }}" -ne "") {
            echo "API_KEYS_CONFIGURED=true" >> $env:GITHUB_ENV
            Write-Host "✅ API keys are configured"
          } else {
            echo "API_KEYS_CONFIGURED=false" >> $env:GITHUB_ENV
            Write-Host "⚠️ OPENAI_API_KEY not configured - tests will be skipped"
          }

      - name: Run automated tests
        if: env.API_KEYS_CONFIGURED == 'true'
        # Gate scope (#1336/#1341): tests/unit only, LLM- and slow-marked tests
        # excluded. The full suite cannot be a per-push gate: integration tests
        # spawn a JVM subprocess or make real LLM calls (~1 test/min — the
        # 2026-07-01 full run reached 2% of 14k tests in 6h before GitHub's job
        # limit killed it), and tests/bench runs 15+ min LLM benchmarks by
        # design. Integration/e2e/bench/LLM lanes need a scheduled or on-demand
        # workflow, not this gate.
        # Backstop below the 6h GitHub job default; --timeout converts a hung
        # test into a failure with a stack dump of every thread (thread method
        # is the only one available on Windows; it aborts the run on fire, so
        # the dump in the log — not the junitxml — is the diagnostic artifact).
        timeout-minutes: 240
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TEXT_CONFIG_PASSPHRASE: ${{ secrets.TEXT_CONFIG_PASSPHRASE }}
        run: |
          conda run -n projet-is --no-capture-output pytest tests/unit/ -m "not slow and not requires_api" --junitxml=pytest_report.xml -v --timeout=900 --timeout-method=thread

      - name: Generate test summary
        if: always()
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "═══════════════════════════════════════════════"
          Write-Host "📊 TEST EXECUTION SUMMARY"
          Write-Host "═══════════════════════════════════════════════"
          
          if (Test-Path pytest_report.xml) {
            [xml]$xml = Get-Content pytest_report.xml
            $total = [int]$xml.testsuites.tests
            $errors = [int]$xml.testsuites.errors
            $failures = [int]$xml.testsuites.failures
            $skipped = [int]$xml.testsuites.skipped
            $passed = $total - $errors - $failures - $skipped
            
            Write-Host "✅ Passed:  $passed / $total"
            Write-Host "❌ Failed:  $($errors + $failures) / $total"
            Write-Host "⏭️  Skipped: $skipped / $total"
            
            if ($skipped -gt 0) {
              Write-Host ""
              Write-Host "ℹ️  Note: $skipped tests were skipped (likely due to missing API keys)"
              Write-Host "   These tests require OPENAI_API_KEY or other API credentials."
              Write-Host "   Configure secrets in GitHub repository settings to run them."
            }
          } else {
            Write-Host "⚠️  No test report generated (tests may have been skipped)"
            Write-Host ""
            Write-Host "ℹ️  API keys not configured - all tests requiring APIs were skipped"
            Write-Host "   This is expected behavior for forks and external contributions"
          }
          Write-Host "═══════════════════════════════════════════════"

      - name: Fail-loud guard — JVM-startup skip storm (#1385, anti-théâtre #1019)
        # A JVM-startup failure on the runner makes an autouse conftest guard
        # (tests/conftest.py:522) skip ~98% of the suite with the message
        # "Saut du test car la JVM n'est pas réellement démarrée". With 0
        # failures the job concludes "success" — a green badge from an infra
        # failure that decided nothing (#1385). This guard fails the job
        # honestly when that specific signature dominates. It is targeted to
        # the JVM skip message, NOT the raw skip rate, so legitimate skips
        # (orphan-model, build-absent, requires_api) never trip it.
        if: always() && env.API_KEYS_CONFIGURED == 'true'
        shell: pwsh
        run: |
          if (-not (Test-Path pytest_report.xml)) {
            Write-Host "ℹ️ No pytest_report.xml — JVM-startup guard skipped (tests produced no report; failure already captured upstream)."
            exit 0
          }
          [xml]$xml = Get-Content pytest_report.xml
          $total = [int]$xml.testsuites.tests
          $content = Get-Content pytest_report.xml -Raw
          $jvmSignature = "JVM n'est pas réellement démarrée"
          # Count <skipped message="...signature..."> occurrences (scoped to
          # skip messages, so a signature mention in test names / stdout cannot
          # inflate the count).
          $jvmSkipCount = ([regex]::Matches($content, 'message="[^"]*' + [regex]::Escape($jvmSignature))).Count
          $pct = if ($total -gt 0) { [math]::Round(100 * $jvmSkipCount / $total) } else { 0 }
          Write-Host "🔍 JVM-startup guard: $jvmSkipCount / $total tests ($pct%) skipped with JVM-not-started signature."
          if ($total -gt 0 -and ($jvmSkipCount / $total) -gt 0.5) {
            Write-Host "❌ FAIL-LOUD: $jvmSkipCount tests ($pct%) were skipped because the JVM did not start."
            Write-Host "   The run decided nothing — a green badge here would be theater (#1385, #1019)."
            Write-Host "   Likely cause: transient Temurin/JVM-setup flake on the runner. Re-run; if it persists, JVM init is broken on CI (urgent)."
            exit 1
          }
          Write-Host "✅ JVM-startup guard OK — JVM-dependent tests ran (or skipped for legitimate non-JVM reasons)."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            pytest_report.xml
            **/*.log
          if-no-files-found: warn

      - name: Notify tests skipped
        if: env.API_KEYS_CONFIGURED != 'true'
        shell: pwsh
        run: |
          Write-Host "ℹ️ Automated tests skipped: API keys not configured"
          Write-Host "This is expected behavior for forks and external contributions"
          Write-Host "Tests requiring API access are marked with @pytest.mark.requires_api"