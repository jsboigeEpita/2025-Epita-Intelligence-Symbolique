name: projet-is
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Python
  - python=3.10
  - pip

  # Core ML/Data Science
  - intel-openmp # Force une version unifiée d'OpenMP
  - mkl # Force l'utilisation des librairies Intel MKL
  - tbb # Threading Building Blocks, souvent lié à MKL
  - numpy=1.25.0 # Version figée pour la stabilité binaire
  - pandas=2.0.3
  - scipy
  - scikit-learn
  - nltk
  - spacy # Laisser conda choisir la version
  - pytorch
  - transformers
  - sympy=1.13.1
  - thinc=8.3.2 # Figé pour compatibilité avec spacy (8.3.4 non trouvé sur conda)

  # Web & API
  - flask
  - requests
  - fastapi
  - uvicorn
  - whitenoise
  - flask-cors
  - starlette
  - a2wsgi
  - asgiref

  # Utilities
  - pydantic
  - pydantic-settings
  - python-dotenv
  - cryptography
  - tqdm
  - pyyaml
  - regex
  - markdown
  - psutil
 
  # Plotting & Graphing
  - matplotlib
  - seaborn
  - statsmodels
  - networkx
  - pyvis
 
  # Logic & Reasoning
  - clingo

  # Testing
  - pytest
  - pytest-cov
  - pytest-mock
  - pytest-asyncio
  - coverage
  - unidecode
  - conda-lock
  
  # Code Quality & Formatting
  - black>=23.0.0      # Python code formatter
  - flake8>=6.0.0      # Linting tool
  - isort>=5.12.0      # Import sorter (optionnel mais recommandé)
  - mypy>=1.0.0        # Static type checker

  # La section pip est pour les paquets non disponibles ou problématiques sur Conda
  - pip:
    - textstat  # FB-23 #1088: readability (Flesch) for the quality-radar clarte detector
    - semantic-kernel>=1.33.0
    - flask_socketio>=5.3.6
    - playwright
    - pytest-playwright
    - psutil
    - ag2>=0.2.0
    - tenacity
    - pybreaker
    - pytest-dotenv
    - mcp
    - blis
    - JPype1>=1.5.0
    - pytest-benchmark
    - tiktoken
    - hypothesis  # #1303: property tests (tests/property/) — CI collection breaks without it
    - pytest-timeout  # CI hang guard: --timeout=900 in ci.yml converts a hung test into a stack-dumped failure
    - pyfakefs>=5.0.0  # #1336: provides the `fs` fixture for test_plugin_loader.py — CI errors "fixture 'fs' not found" without it
    - diskcache  # #1336: LLM response cache (llm_cache.py CachedChatCompletion). In requirements.txt but not environment.yml — CI provisions via environment.yml, so diskcache was absent on runners → CachedChatCompletion fell back to OFF mode, failing 5 test_llm_cache tests. Same drift class as pyfakefs (#1353) and hypothesis (#1303).
